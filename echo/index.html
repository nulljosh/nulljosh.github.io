<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo: On-Device Transcription</title>
    <meta name="description" content="Transcribe speech, music, and audio files entirely on-device. No account, no cloud, no subscription.">
    <meta property="og:title" content="Echo: On-Device Transcription">
    <meta property="og:description" content="Voice to text, nothing leaves your device.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-left">
                    <svg class="navbar-icon" viewBox="0 0 200 200" width="32" height="32">
                        <rect width="200" height="200" rx="44" fill="#7C3AED"/>
                        <circle cx="100" cy="80" r="16" fill="#ffffff"/>
                        <rect x="91" y="96" width="18" height="24" rx="9" fill="#ffffff"/>
                        <path d="M72 102 Q72 126 100 126 Q128 126 128 102" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
                        <line x1="100" y1="126" x2="100" y2="140" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
                        <line x1="84" y1="140" x2="116" y2="140" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
                        <rect x="36" y="92" width="6" height="12" rx="3" fill="#ffffff" opacity="0.9"/>
                        <rect x="48" y="84" width="6" height="28" rx="3" fill="#ffffff" opacity="0.95"/>
                        <rect x="60" y="76" width="6" height="44" rx="3" fill="#ffffff"/>
                        <rect x="134" y="76" width="6" height="44" rx="3" fill="#ffffff"/>
                        <rect x="146" y="84" width="6" height="28" rx="3" fill="#ffffff" opacity="0.95"/>
                        <rect x="158" y="92" width="6" height="12" rx="3" fill="#ffffff" opacity="0.9"/>
                    </svg>
                    <h1 class="navbar-title">Echo</h1>
                </div>
                <div class="navbar-right">
                    <button class="btn-icon" id="settingsBtn" title="Settings">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6m8-13l-4.24 4.24m-7.52 0L4 4m11.24 11.76L20 20m-11.76-11.76L4 4"></path>
                        </svg>
                    </button>
                    <button class="btn-icon" id="themeBtn" title="Toggle dark mode">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Input Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="record">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="8"></circle>
                    </svg>
                    Record
                </button>
                <button class="tab-btn" data-tab="upload">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Upload
                </button>
            </div>

            <!-- Record Tab -->
            <section id="record-tab" class="tab-content active">
                <div class="record-section">
                    <!-- Waveform Visualization -->
                    <div class="waveform-container">
                        <canvas id="waveformCanvas"></canvas>
                        <div class="waveform-bars" id="waveformBars">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>

                    <!-- Record Button -->
                    <div class="record-controls">
                        <button id="recordBtn" class="btn-record">
                            <span class="record-icon"></span>
                        </button>
                        <div class="record-status">
                            <p id="recordStatus">Press record to start</p>
                            <p id="recordTime" class="record-time">0:00</p>
                        </div>
                    </div>

                    <!-- Settings Row -->
                    <div class="settings-row">
                        <div class="setting-group">
                            <label for="languageSelect">Language:</label>
                            <select id="languageSelect" class="select-control">
                                <option value="auto">Auto-detect</option>
                                <option value="en">English</option>
                                <option value="es">Spanish</option>
                                <option value="fr">French</option>
                                <option value="de">German</option>
                                <option value="it">Italian</option>
                                <option value="pt">Portuguese</option>
                                <option value="ru">Russian</option>
                                <option value="ja">Japanese</option>
                                <option value="ko">Korean</option>
                                <option value="zh">Chinese</option>
                                <option value="ar">Arabic</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Upload Tab -->
            <section id="upload-tab" class="tab-content">
                <div class="upload-section">
                    <div class="upload-area" id="uploadArea">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <h3>Drop audio files here</h3>
                        <p>or click to select</p>
                        <input type="file" id="fileInput" accept="audio/*" style="display:none;">
                    </div>

                    <!-- Upload Settings -->
                    <div class="settings-row">
                        <div class="setting-group">
                            <label for="uploadLanguageSelect">Language:</label>
                            <select id="uploadLanguageSelect" class="select-control">
                                <option value="auto">Auto-detect</option>
                                <option value="en">English</option>
                                <option value="es">Spanish</option>
                                <option value="fr">French</option>
                                <option value="de">German</option>
                                <option value="it">Italian</option>
                                <option value="pt">Portuguese</option>
                                <option value="ru">Russian</option>
                                <option value="ja">Japanese</option>
                                <option value="ko">Korean</option>
                                <option value="zh">Chinese</option>
                                <option value="ar">Arabic</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Transcription Display -->
            <div id="transcriptionArea" class="transcription-area" style="display:none;">
                <div class="transcription-header">
                    <h2>Transcription</h2>
                    <div class="transcription-actions">
                        <button class="btn-action" id="copyBtn" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                            </svg>
                            Copy
                        </button>
                        <button class="btn-action" id="downloadBtn" title="Download as text">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Download
                        </button>
                        <button class="btn-action btn-close" id="closeTranscriptionBtn" title="Close">×</button>
                    </div>
                </div>
                <div id="transcriptionText" class="transcription-text"></div>
                <p id="transcriptionMeta" class="transcription-meta"></p>
            </div>
        </div>

        <!-- History Panel -->
        <div id="historyPanel" class="history-panel">
            <div class="history-header">
                <h2>History</h2>
                <button class="btn-icon" id="clearHistoryBtn" title="Clear all history">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>
            <div id="historyList" class="history-list">
                <p class="history-empty">No transcriptions yet</p>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button class="btn-icon" id="closeSettingsBtn">×</button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label for="modelSelect">Transcription Model:</label>
                        <select id="modelSelect" class="select-control">
                            <option value="web-speech">Web Speech API (Fast, Offline)</option>
                        </select>
                        <p class="setting-description">Uses your browser's built-in speech recognition. Offline and free, but accuracy varies by browser.</p>
                    </div>
                    <div class="setting-item">
                        <button id="exportHistoryBtn" class="btn-secondary">Export History as JSON</button>
                        <button id="importHistoryBtn" class="btn-secondary">Import History</button>
                        <input type="file" id="historyFileInput" accept=".json" style="display:none;">
                    </div>
                </div>
            </div>
        </div>

        <!-- Overlay for modals -->
        <div id="modalOverlay" class="modal-overlay" style="display:none;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
