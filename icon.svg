<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a1a" rx="32"/>
  <!-- Outer glass frame -->
  <rect x="40" y="30" width="120" height="140" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Inner glass card -->
  <rect x="52" y="42" width="96" height="116" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- J monogram -->
  <text x="100" y="116" fill="rgba(255,255,255,0.6)" font-family="-apple-system,system-ui,sans-serif" font-size="68" font-weight="200" text-anchor="middle" letter-spacing="-2">J</text>
  <!-- Thin accent line above J -->
  <line x1="76" y1="54" x2="124" y2="54" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Divider below J -->
  <line x1="72" y1="132" x2="128" y2="132" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Subtitle dots -->
  <circle cx="84" cy="146" r="1.5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="96" cy="146" r="1.5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="108" cy="146" r="1.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Corner accents -->
  <line x1="56" y1="48" x2="64" y2="48" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="56" y1="48" x2="56" y2="56" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="144" y1="48" x2="136" y2="48" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="144" y1="48" x2="144" y2="56" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
</svg>