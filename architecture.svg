<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 600; fill: #fff; }
    .label { font-size: 10px; font-weight: 500; fill: #1d1d1f; }
    .line { stroke: #d2d2d7; stroke-width: 1.5; fill: none; }
    .node { fill: #f5f5f7; stroke: #d2d2d7; stroke-width: 1; rx: 10; }
    .center { fill: #0071e3; rx: 14; }
  </style>

  <!-- Center node -->
  <rect class="center" x="125" y="125" width="150" height="40"/>
  <text class="title" x="200" y="150" text-anchor="middle">Personal Website</text>

  <!-- Lines -->
  <line class="line" x1="200" y1="125" x2="65" y2="55"/>
  <line class="line" x1="200" y1="125" x2="200" y2="45"/>
  <line class="line" x1="200" y1="125" x2="335" y2="55"/>
  <line class="line" x1="125" y1="145" x2="55" y2="210"/>
  <line class="line" x1="275" y1="145" x2="345" y2="210"/>
  <line class="line" x1="200" y1="165" x2="200" y2="240"/>

  <!-- Top row: subdirs -->
  <rect class="node" x="15" y="35" width="100" height="30"/>
  <text class="label" x="65" y="55" text-anchor="middle">books/</text>

  <rect class="node" x="148" y="20" width="104" height="30"/>
  <text class="label" x="200" y="40" text-anchor="middle">scroll/</text>

  <rect class="node" x="285" y="35" width="100" height="30"/>
  <text class="label" x="335" y="55" text-anchor="middle">1971/</text>

  <!-- Bottom row -->
  <rect class="node" x="5" y="195" width="100" height="30"/>
  <text class="label" x="55" y="215" text-anchor="middle">bcgd/</text>

  <rect class="node" x="295" y="195" width="100" height="30"/>
  <text class="label" x="345" y="215" text-anchor="middle">SEO + Schema</text>

  <!-- Bottom center -->
  <rect class="node" x="145" y="235" width="110" height="30"/>
  <text class="label" x="200" y="255" text-anchor="middle">GitHub Pages</text>
</svg>
